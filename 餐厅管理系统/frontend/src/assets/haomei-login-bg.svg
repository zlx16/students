<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f0b0d"/>
      <stop offset="0.42" stop-color="#2a1116"/>
      <stop offset="1" stop-color="#4a171f"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1550 170) rotate(34) scale(620 420)">
      <stop stop-color="#f8d58b" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#f8d58b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 940) rotate(-10) scale(880 420)">
      <stop stop-color="#7c1f2c" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#7c1f2c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b5873c" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#e8c27a" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#b5873c" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#goldGlow)"/>
  <rect width="1920" height="1080" fill="url(#redGlow)"/>

  <g opacity="0.2">
    <path d="M0 118H1920" stroke="url(#lineGold)" stroke-width="2"/>
    <path d="M0 958H1920" stroke="url(#lineGold)" stroke-width="2"/>
  </g>

  <!-- high-end Chinese style abstract platter -->
  <g opacity="0.92">
    <circle cx="1390" cy="610" r="320" fill="#e7c58f" fill-opacity="0.11"/>
    <circle cx="1390" cy="610" r="258" fill="#f5e4c3" fill-opacity="0.2"/>
    <circle cx="1390" cy="610" r="186" fill="#d39b55" fill-opacity="0.2"/>
    <circle cx="1326" cy="548" r="52" fill="#d89a48" fill-opacity="0.58"/>
    <circle cx="1470" cy="672" r="44" fill="#b7652d" fill-opacity="0.66"/>
    <circle cx="1428" cy="560" r="36" fill="#efcb8b" fill-opacity="0.76"/>
    <circle cx="1322" cy="672" r="32" fill="#8e2a2f" fill-opacity="0.68"/>
    <circle cx="1502" cy="566" r="28" fill="#f2daa8" fill-opacity="0.72"/>
  </g>

  <g filter="url(#soft)" opacity="0.45">
    <ellipse cx="1220" cy="340" rx="260" ry="88" fill="#f0d299"/>
    <ellipse cx="1690" cy="760" rx="220" ry="74" fill="#8e2736"/>
    <ellipse cx="170" cy="224" rx="280" ry="110" fill="#7a1e2c"/>
  </g>

  <!-- subtle Chinese motif circles -->
  <g opacity="0.22" stroke="#e7c784">
    <circle cx="255" cy="285" r="128" stroke-width="1.6"/>
    <circle cx="255" cy="285" r="96" stroke-width="1.2"/>
    <circle cx="255" cy="285" r="64" stroke-width="1"/>
  </g>
  <g opacity="0.18" stroke="#e7c784">
    <circle cx="1710" cy="820" r="112" stroke-width="1.6"/>
    <circle cx="1710" cy="820" r="82" stroke-width="1.2"/>
    <circle cx="1710" cy="820" r="52" stroke-width="1"/>
  </g>

  <g opacity="0.24">
    <path d="M0 846C300 780 580 930 900 890C1130 862 1328 740 1600 770C1742 786 1856 828 1920 856V1080H0V846Z" fill="#1a0b0e"/>
    <path d="M0 934C310 878 640 1004 972 968C1240 938 1450 850 1710 900C1804 918 1878 942 1920 962V1080H0V934Z" fill="#12080a"/>
  </g>
</svg>
