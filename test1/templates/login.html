{% extends "base.html" %}

{% block title %}管理员登录 · 学生管理系统{% endblock %}

{% block content %}
  <section class="auth">
    <div class="auth__card card">
      <div class="card__header">
        <div>
          <h1 class="h1">管理员登录</h1>
          <div class="muted auth__hint">默认账号：<span class="mono">admin</span> · 默认密码：<span class="mono">admin123</span></div>
        </div>
      </div>
      <div class="card__body">
        <form class="form" method="post" action="{{ url_for('do_login') }}">
          <input type="hidden" name="next" value="{{ next or '' }}" />

          <div class="field">
            <label class="label">账号</label>
            <input class="input" name="username" autocomplete="username" placeholder="请输入管理员账号" required />
          </div>

          <div class="field" style="margin-top:12px;">
            <label class="label">密码</label>
            <input class="input" type="password" name="password" autocomplete="current-password" placeholder="请输入密码" required />
          </div>

          <div class="form-actions" style="margin-top:16px;">
            <button class="btn btn--primary" type="submit">登录</button>
          </div>
        </form>
      </div>
    </div>
  </section>
{% endblock %}
