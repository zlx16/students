<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="40" y1="40" x2="470" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a0d12"/>
      <stop offset="0.45" stop-color="#7b1b24"/>
      <stop offset="1" stop-color="#b4432b"/>
    </linearGradient>
    <linearGradient id="gold" x1="112" y1="98" x2="390" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbeabf"/>
      <stop offset="0.45" stop-color="#e8c47a"/>
      <stop offset="1" stop-color="#ba843d"/>
    </linearGradient>
    <linearGradient id="gold2" x1="120" y1="210" x2="392" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7dcaa"/>
      <stop offset="1" stop-color="#cb964b"/>
    </linearGradient>
    <radialGradient id="softLight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(368 116) rotate(145) scale(250)">
      <stop stop-color="#ffe2a5" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffe2a5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- outer seal card -->
  <rect x="20" y="20" width="472" height="472" rx="104" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="104" stroke="#e7c785" stroke-opacity="0.45" stroke-width="4"/>
  <rect x="42" y="42" width="428" height="428" rx="88" stroke="#e7c785" stroke-opacity="0.25" stroke-width="2"/>
  <rect width="512" height="512" fill="url(#softLight)"/>

